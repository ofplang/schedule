spec_version: '0.0'
types:
  Plate:
    domain: object
processes:
  source:
    kind: atomic
    outputs:
      plate:
        type: Plate
        phase: data
    objects:
      create:
      - outputs.plate
  sink:
    kind: atomic
    inputs:
      plate:
        type: Plate
        phase: data
    objects:
      consume:
      - inputs.plate
  peal:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  dispense:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  seal:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  thermal_cycle:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  rotate:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  main:
    kind: composite
    inputs: {}
    outputs: {}
    body:
      nodes:
      - id: source_b1
        process: source
      - id: peal_b1_r1
        process: peal
        state:
          plate:
            from: source_b1.plate
      - id: dispense_b1_r1
        process: dispense
        state:
          plate:
            from: peal_b1_r1.plate
      - id: seal_b1_r1
        process: seal
        state:
          plate:
            from: dispense_b1_r1.plate
      - id: thermal_b1_r1
        process: thermal_cycle
        state:
          plate:
            from: seal_b1_r1.plate
      - id: rotate_b1_r1
        process: rotate
        state:
          plate:
            from: thermal_b1_r1.plate
      - id: peal_b1_r2
        process: peal
        state:
          plate:
            from: rotate_b1_r1.plate
      - id: dispense_b1_r2
        process: dispense
        state:
          plate:
            from: peal_b1_r2.plate
      - id: seal_b1_r2
        process: seal
        state:
          plate:
            from: dispense_b1_r2.plate
      - id: thermal_b1_r2
        process: thermal_cycle
        state:
          plate:
            from: seal_b1_r2.plate
      - id: rotate_b1_r2
        process: rotate
        state:
          plate:
            from: thermal_b1_r2.plate
      - id: sink_b1
        process: sink
        state:
          plate:
            from: rotate_b1_r2.plate
      - id: source_b2
        process: source
      - id: peal_b2_r1
        process: peal
        state:
          plate:
            from: source_b2.plate
      - id: dispense_b2_r1
        process: dispense
        state:
          plate:
            from: peal_b2_r1.plate
      - id: seal_b2_r1
        process: seal
        state:
          plate:
            from: dispense_b2_r1.plate
      - id: thermal_b2_r1
        process: thermal_cycle
        state:
          plate:
            from: seal_b2_r1.plate
      - id: rotate_b2_r1
        process: rotate
        state:
          plate:
            from: thermal_b2_r1.plate
      - id: peal_b2_r2
        process: peal
        state:
          plate:
            from: rotate_b2_r1.plate
      - id: dispense_b2_r2
        process: dispense
        state:
          plate:
            from: peal_b2_r2.plate
      - id: seal_b2_r2
        process: seal
        state:
          plate:
            from: dispense_b2_r2.plate
      - id: thermal_b2_r2
        process: thermal_cycle
        state:
          plate:
            from: seal_b2_r2.plate
      - id: rotate_b2_r2
        process: rotate
        state:
          plate:
            from: thermal_b2_r2.plate
      - id: sink_b2
        process: sink
        state:
          plate:
            from: rotate_b2_r2.plate
      returns: {}
entry: main
