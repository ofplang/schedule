spec_version: '0.0'
types:
  Plate:
    domain: object
processes:
  source:
    kind: atomic
    outputs:
      plate_1:
        type: Plate
        phase: data
      plate_2:
        type: Plate
        phase: data
    objects:
      create:
      - outputs.plate_1
      - outputs.plate_2
  sink:
    kind: atomic
    inputs:
      plate_1:
        type: Plate
        phase: data
      plate_2:
        type: Plate
        phase: data
    objects:
      consume:
      - inputs.plate_1
      - inputs.plate_2
  peal:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  dispense:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  seal:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  thermal_cycle:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  rotate:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  main:
    kind: composite
    inputs: {}
    outputs: {}
    body:
      nodes:
      - id: source
        process: source
      - id: peal_b1_r1
        process: peal
        state:
          plate:
            from: source.plate_1
      - id: dispense_b1_r1
        process: dispense
        state:
          plate:
            from: peal_b1_r1.plate
      - id: seal_b1_r1
        process: seal
        state:
          plate:
            from: dispense_b1_r1.plate
      - id: thermal_b1_r1
        process: thermal_cycle
        state:
          plate:
            from: seal_b1_r1.plate
      - id: rotate_b1_r1
        process: rotate
        state:
          plate:
            from: thermal_b1_r1.plate
      - id: peal_b1_r2
        process: peal
        state:
          plate:
            from: rotate_b1_r1.plate
      - id: dispense_b1_r2
        process: dispense
        state:
          plate:
            from: peal_b1_r2.plate
      - id: seal_b1_r2
        process: seal
        state:
          plate:
            from: dispense_b1_r2.plate
      - id: thermal_b1_r2
        process: thermal_cycle
        state:
          plate:
            from: seal_b1_r2.plate
      - id: rotate_b1_r2
        process: rotate
        state:
          plate:
            from: thermal_b1_r2.plate
      - id: peal_b2_r1
        process: peal
        state:
          plate:
            from: source.plate_2
      - id: dispense_b2_r1
        process: dispense
        state:
          plate:
            from: peal_b2_r1.plate
      - id: seal_b2_r1
        process: seal
        state:
          plate:
            from: dispense_b2_r1.plate
      - id: thermal_b2_r1
        process: thermal_cycle
        state:
          plate:
            from: seal_b2_r1.plate
      - id: rotate_b2_r1
        process: rotate
        state:
          plate:
            from: thermal_b2_r1.plate
      - id: peal_b2_r2
        process: peal
        state:
          plate:
            from: rotate_b2_r1.plate
      - id: dispense_b2_r2
        process: dispense
        state:
          plate:
            from: peal_b2_r2.plate
      - id: seal_b2_r2
        process: seal
        state:
          plate:
            from: dispense_b2_r2.plate
      - id: thermal_b2_r2
        process: thermal_cycle
        state:
          plate:
            from: seal_b2_r2.plate
      - id: rotate_b2_r2
        process: rotate
        state:
          plate:
            from: thermal_b2_r2.plate
      - id: sink
        process: sink
        state:
          plate_1:
            from: rotate_b1_r2.plate
          plate_2:
            from: rotate_b2_r2.plate
      returns: {}
entry: main
