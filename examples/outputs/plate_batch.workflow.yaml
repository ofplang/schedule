spec_version: '0.0'
types:
  Plate:
    domain: object
processes:
  source:
    kind: atomic
    outputs:
      plate_1:
        type: Plate
        phase: data
      plate_2:
        type: Plate
        phase: data
    objects:
      create:
      - outputs.plate_1
      - outputs.plate_2
  sink:
    kind: atomic
    inputs:
      plate_1:
        type: Plate
        phase: data
      plate_2:
        type: Plate
        phase: data
    objects:
      consume:
      - inputs.plate_1
      - inputs.plate_2
  peal:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  dispense:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  seal:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  thermal_cycle:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  rotate:
    kind: atomic
    traits:
    - elidable_iso
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
  repeat_unit:
    kind: composite
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
    body:
      nodes:
      - id: peal
        process: peal
        state:
          plate:
            from: inputs.plate
      - id: dispense
        process: dispense
        state:
          plate:
            from: peal.plate
      - id: seal
        process: seal
        state:
          plate:
            from: dispense.plate
      - id: thermal
        process: thermal_cycle
        state:
          plate:
            from: seal.plate
      - id: rotate
        process: rotate
        state:
          plate:
            from: thermal.plate
      returns:
        plate:
          from: rotate.plate
  branch:
    kind: composite
    inputs:
      plate:
        type: Plate
        phase: data
    outputs:
      plate:
        type: Plate
        phase: data
    body:
      nodes:
      - id: rep1
        process: repeat_unit
        state:
          plate:
            from: inputs.plate
      - id: rep2
        process: repeat_unit
        state:
          plate:
            from: rep1.plate
      returns:
        plate:
          from: rep2.plate
  main:
    kind: composite
    inputs: {}
    outputs: {}
    body:
      nodes:
      - id: source
        process: source
      - id: b1
        process: branch
        state:
          plate:
            from: source.plate_1
      - id: b2
        process: branch
        state:
          plate:
            from: source.plate_2
      - id: sink
        process: sink
        state:
          plate_1:
            from: b1.plate
          plate_2:
            from: b2.plate
      returns: {}
entry: main
