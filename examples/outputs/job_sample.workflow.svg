  .arrow { stroke: var(--arrow); stroke-width: 1.3; fill: none; opacity: 0.8; }
  .arrowhead { fill: var(--arrow); }
  .now { stroke: var(--now); stroke-width: 1.5; stroke-dasharray: 4 3; }
  .nowlabel { fill: var(--now); }
