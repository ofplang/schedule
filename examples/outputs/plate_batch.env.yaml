time:
  unit: second
devices:
- id: loader
  spots:
  - s1
  - s2
- id: peal
  spots:
  - core
- id: dispense
  spots:
  - core
- id: seal
  spots:
  - core
- id: rotate
  spots:
  - core
- id: thermal_cycle_1
  spots:
  - core
- id: thermal_cycle_2
  spots:
  - core
transporters:
- id: transport
transports:
- transporter: transport
  from: loader.s1
  to: peal.core
  duration: 1
- transporter: transport
  from: rotate.core
  to: loader.s1
  duration: 1
- transporter: transport
  from: loader.s2
  to: peal.core
  duration: 1
- transporter: transport
  from: rotate.core
  to: loader.s2
  duration: 1
- transporter: transport
  from: peal.core
  to: dispense.core
  duration: 1
- transporter: transport
  from: dispense.core
  to: seal.core
  duration: 1
- transporter: transport
  from: seal.core
  to: thermal_cycle_1.core
  duration: 1
- transporter: transport
  from: thermal_cycle_1.core
  to: rotate.core
  duration: 1
- transporter: transport
  from: seal.core
  to: thermal_cycle_2.core
  duration: 1
- transporter: transport
  from: thermal_cycle_2.core
  to: rotate.core
  duration: 1
- transporter: transport
  from: rotate.core
  to: peal.core
  duration: 1
processes:
  source:
    modes:
    - devices:
      - loader
      duration: 1
      output_spots:
        plate_1: loader.s1
        plate_2: loader.s2
  sink:
    modes:
    - devices:
      - loader
      duration: 1
      input_spots:
        plate_1: loader.s1
        plate_2: loader.s2
  peal:
    modes:
    - devices:
      - peal
      duration: 1
      input_spots:
        plate: peal.core
      output_spots:
        plate: peal.core
  dispense:
    modes:
    - devices:
      - dispense
      duration: 3
      input_spots:
        plate: dispense.core
      output_spots:
        plate: dispense.core
  seal:
    modes:
    - devices:
      - seal
      duration: 1
      input_spots:
        plate: seal.core
      output_spots:
        plate: seal.core
  rotate:
    modes:
    - devices:
      - rotate
      duration: 1
      input_spots:
        plate: rotate.core
      output_spots:
        plate: rotate.core
  thermal_cycle:
    modes:
    - devices:
      - thermal_cycle_1
      duration: 10
      input_spots:
        plate: thermal_cycle_1.core
      output_spots:
        plate: thermal_cycle_1.core
    - devices:
      - thermal_cycle_2
      duration: 10
      input_spots:
        plate: thermal_cycle_2.core
      output_spots:
        plate: thermal_cycle_2.core
objective:
  kind: makespan
