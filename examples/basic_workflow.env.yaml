# Shared execution environment for basic-workflow YAMLs generated by
# gen_basic_workflow.py (any --branches / --repeats). It does not depend on those
# counts: every generated node invokes one of the fixed process definitions
# below, so this one file schedules them all.
#
# Ported from ofp-scheduler's basic_workflow_demo: peal/dispense/seal/rotate are
# single-device stages that branches contend for, the loader is the shared
# start/end position (source/sink), and thermal_cycle has a two-device pool so
# parallel branches can cycle at the same time (the scheduler picks the mode).

time:
  unit: second

devices:
  - { id: loader, spots: [core] }        # source/sink position (shared start/end)
  - { id: peal, spots: [core] }
  - { id: dispense, spots: [core] }
  - { id: seal, spots: [core] }
  - { id: rotate, spots: [core] }
  - { id: thermal_cycle_1, spots: [core] }   # thermal pool (parallel via modes)
  - { id: thermal_cycle_2, spots: [core] }

transporters:
  - { id: transport }

# One transporter; every move takes 1 time unit. Only the directed spot pairs the
# chain actually uses are listed (same-spot moves are 0 and omitted, §5.4).
transports:
  - { transporter: transport, from: loader.core,          to: peal.core,            duration: 1 }
  - { transporter: transport, from: peal.core,            to: dispense.core,        duration: 1 }
  - { transporter: transport, from: dispense.core,        to: seal.core,            duration: 1 }
  - { transporter: transport, from: seal.core,            to: thermal_cycle_1.core, duration: 1 }
  - { transporter: transport, from: seal.core,            to: thermal_cycle_2.core, duration: 1 }
  - { transporter: transport, from: thermal_cycle_1.core, to: rotate.core,          duration: 1 }
  - { transporter: transport, from: thermal_cycle_2.core, to: rotate.core,          duration: 1 }
  - { transporter: transport, from: rotate.core,          to: peal.core,            duration: 1 }  # next repeat
  - { transporter: transport, from: rotate.core,          to: loader.core,          duration: 1 }  # to sink

processes:

  source:
    modes:
      - devices: [loader]
        duration: 1
        output_spots: { plate: loader.core }

  peal:
    modes:
      - devices: [peal]
        duration: 1
        input_spots: { plate: peal.core }
        output_spots: { plate: peal.core }

  dispense:
    modes:
      - devices: [dispense]
        duration: 3
        input_spots: { plate: dispense.core }
        output_spots: { plate: dispense.core }

  seal:
    modes:
      - devices: [seal]
        duration: 1
        input_spots: { plate: seal.core }
        output_spots: { plate: seal.core }

  thermal_cycle:                          # two interchangeable devices (a pool)
    modes:
      - devices: [thermal_cycle_1]
        duration: 10
        input_spots: { plate: thermal_cycle_1.core }
        output_spots: { plate: thermal_cycle_1.core }
      - devices: [thermal_cycle_2]
        duration: 10
        input_spots: { plate: thermal_cycle_2.core }
        output_spots: { plate: thermal_cycle_2.core }

  rotate:
    modes:
      - devices: [rotate]
        duration: 1
        input_spots: { plate: rotate.core }
        output_spots: { plate: rotate.core }

  sink:
    modes:
      - devices: [loader]
        duration: 1
        input_spots: { plate: loader.core }

objective:
  kind: makespan
