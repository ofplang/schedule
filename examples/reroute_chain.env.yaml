# Environment for a chained re-routing replan of the `simple` workflow.
#
# Scenario: the sample has been carried station_0 -> station_1 -> station_2 by two
# committed legs, but `target` now runs only on station_3, reached by a further
# real move station_2.core -> station_3.core. Each committed leg's arrival spot
# becomes a relay, so the relays chain (relay after relay). Because every leg here
# is a real move (none is a zero-distance no-op), all the relays are kept in the
# output — contrast reroute_stay.env.yaml, where a stay-put no-op is folded.
#
#   ofp-schedule schedule simple.workflow.yaml --env reroute_chain.env.yaml \
#       --status reroute_chain.status.yaml
time:
  unit: second

devices:
  - id: station_0
    spots: [core]
  - id: station_1          # kept as devices holding the sample between legs,
    spots: [core]          # though target no longer runs on 1 or 2
  - id: station_2
    spots: [core]
  - id: station_3
    spots: [core]

transporters:
  - id: transport

transports:
  - { transporter: transport, from: station_0.core, to: station_1.core, duration: 1 }
  - { transporter: transport, from: station_1.core, to: station_2.core, duration: 4 }
  - { transporter: transport, from: station_2.core, to: station_3.core, duration: 2 }

processes:
  source:
    modes:
      - devices: [station_0]
        duration: 2
        output_spots: { source_out: station_0.core }
  target:
    modes:
      - devices: [station_3]        # only station_3 remains
        duration: 2
        input_spots: { target_in: station_3.core }
