# Environment for a re-routing replan of the `simple` workflow.
#
# Scenario: mid-run, station_1 (where `target` used to run) becomes unavailable —
# its `target` capability is removed. The device and its spot are kept, and a
# transport route station_1.core -> station_2.core is available, so material
# already delivered to station_1 can be moved on. `target` now runs only on
# station_2. Replanning from reroute.status.yaml therefore re-routes the sample
# through a relay at station_1.core and a re-transport to station_2.core.
#
#   ofp-schedule schedule simple.workflow.yaml --env reroute.env.yaml \
#       --status reroute.status.yaml
time:
  unit: second

devices:
  - id: station_0
    spots: [core]
  - id: station_1          # kept as a device (holds the delivered sample) though
    spots: [core]          # it can no longer run `target`
  - id: station_2
    spots: [core]

transporters:
  - id: transport

transports:
  - { transporter: transport, from: station_0.core, to: station_1.core, duration: 1 }
  - { transporter: transport, from: station_1.core, to: station_2.core, duration: 4 }

processes:
  source:
    modes:
      - devices: [station_0]
        duration: 2
        output_spots: { source_out: station_0.core }
  target:
    modes:
      - devices: [station_2]        # station_1 mode removed; only station_2 remains
        duration: 2
        input_spots: { target_in: station_2.core }
