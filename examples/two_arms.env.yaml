# Execution environment for two_arms.workflow.yaml (docs/SPECIFICATIONS.md §5).
#
# Two transporters, exercising every part of the multi-transporter model (§4.6):
#   - `arm0` can serve both moves; `arm1` is faster on route A (7 vs 10) but has
#     no table entry for route B, so it *cannot* make that move — reachability is
#     expressed by presence in the table (§5.4).
#   - The two moves (job A: station_a1 -> station_a2; job B: station_b1 ->
#     station_b2) touch disjoint devices, so with two arms they run concurrently.
#
# Resulting optimal schedule (makespan 20):
#   - job B's move can only use arm0 (10 units); its chain is 5 + 10 + 5 = 20.
#   - job A takes the faster arm1 (7 units) in parallel; its chain is 5 + 7 + 5 = 17.
#   - makespan = 20, bounded by job B.
# A single transporter would serialise the two 10-unit moves, giving makespan 30.

time:
  unit: second

devices:
  - id: station_a1                              # job A source
    spots: [core]
  - id: station_a2                              # job A target
    spots: [core]
  - id: station_b1                              # job B source
    spots: [core]
  - id: station_b2                              # job B target
    spots: [core]

transporters:
  - id: arm0
  - id: arm1

transports:  # from/to are qualified <device>.<spot>
  - { transporter: arm0, from: station_a1.core, to: station_a2.core, duration: 10 }
  - { transporter: arm1, from: station_a1.core, to: station_a2.core, duration: 7 }   # arm1 faster on route A
  - { transporter: arm0, from: station_b1.core, to: station_b2.core, duration: 10 }
  # no arm1 entry for station_b1.core -> station_b2.core: arm1 cannot serve route B

processes:

  source_a:
    modes:
      - devices: [station_a1]
        duration: 5
        output_spots:
          sample_out: station_a1.core

  source_b:
    modes:
      - devices: [station_b1]
        duration: 5
        output_spots:
          sample_out: station_b1.core

  target_a:
    modes:
      - devices: [station_a2]
        duration: 5
        input_spots:
          sample_in: station_a2.core

  target_b:
    modes:
      - devices: [station_b2]
        duration: 5
        input_spots:
          sample_in: station_b2.core

objective:
  kind: makespan
