# Execution environment for reformatter.workflow.yaml (docs/SPECIFICATIONS.md §5).
#
# Ported from ofp-scheduler's reformatter demo context. Notes on the port:
#   - ofp-scheduler stations "Prep" / "Reformatter" / "Motoman" become devices;
#     "Biomek2000.A3" and "Biomek2000.A4" are split into two devices because a
#     v0 identifier cannot contain "." (§8.1). They are independent resources,
#     matching ofp-scheduler where they are distinct stations.
#   - Global spot ids (hyphenated in ofp-scheduler) are re-expressed as
#     `<device>.<local_spot>`; hyphens become underscores.
#   - `spot rf_link` on the reformatter is the internal buffer the three
#     reformatter operations hand a plate through (same-spot => 0 transport).
#   - A single transporter, per the initial ofplang.schedule scope.

time:
  unit: second

devices:
  - id: prep
    spots: [out_rf12, out_motoman, out_a3_24]
  - id: reformatter
    spots: [rf12_in, rf_link, rf12_out_a4, rf20_in_motoman, rf20_in_a3_24, rf20_out_a3_19, rf3_in_a4, rf3_in_a3_19]
  - id: motoman
    spots: [in_from_prep, out_a4, out_rf20]
  - id: biomek2000_a3
    spots: [a24_in, a24_out, a19_in, a19_out]
  - id: biomek2000_a4
    spots: [in_from_rf12, in_from_motoman, out_rf3]

transporters:
  - id: transport

# Directed durations from ofp-scheduler's `directed_durations` (symmetric there;
# only the arc directions actually used are listed). Same-spot handoffs through
# reformatter.rf_link are duration 0 and omitted (§5.4).
transports:
  - { transporter: transport, from: prep.out_rf12,               to: reformatter.rf12_in,        duration: 2 }
  - { transporter: transport, from: prep.out_motoman,            to: motoman.in_from_prep,       duration: 3 }
  - { transporter: transport, from: prep.out_a3_24,              to: biomek2000_a3.a24_in,       duration: 6 }
  - { transporter: transport, from: reformatter.rf12_out_a4,     to: biomek2000_a4.in_from_rf12, duration: 2 }
  - { transporter: transport, from: motoman.out_a4,              to: biomek2000_a4.in_from_motoman, duration: 3 }
  - { transporter: transport, from: motoman.out_rf20,            to: reformatter.rf20_in_motoman, duration: 2 }
  - { transporter: transport, from: biomek2000_a3.a24_out,       to: reformatter.rf20_in_a3_24,  duration: 5 }
  - { transporter: transport, from: reformatter.rf20_out_a3_19,  to: biomek2000_a3.a19_in,       duration: 5 }
  - { transporter: transport, from: biomek2000_a4.out_rf3,       to: reformatter.rf3_in_a4,      duration: 2 }
  - { transporter: transport, from: biomek2000_a3.a19_out,       to: reformatter.rf3_in_a3_19,   duration: 5 }

# One mode per process definition; `devices` names the executing device and the
# port->spot maps use qualified `<device>.<spot>`. Durations are the ofp-scheduler
# task durations.
processes:

  preparation:
    modes:
      - devices: [prep]
        duration: 1
        output_spots:
          prep_out_rf12:    prep.out_rf12
          prep_out_motoman: prep.out_motoman
          prep_out_a3_24:   prep.out_a3_24

  reformatter_12:
    modes:
      - devices: [reformatter]
        duration: 12
        input_spots:
          rf12_in: reformatter.rf12_in
        output_spots:
          rf12_out_rf20: reformatter.rf_link
          rf12_out_a4:   reformatter.rf12_out_a4

  motoman_7:
    modes:
      - devices: [motoman]
        duration: 7
        input_spots:
          motoman_in: motoman.in_from_prep
        output_spots:
          motoman_out_a4:   motoman.out_a4
          motoman_out_rf20: motoman.out_rf20

  biomek_a3_24:
    modes:
      - devices: [biomek2000_a3]
        duration: 24
        input_spots:
          a3_24_in: biomek2000_a3.a24_in
        output_spots:
          a3_24_out_rf20: biomek2000_a3.a24_out

  biomek_a4_16:
    modes:
      - devices: [biomek2000_a4]
        duration: 16
        input_spots:
          a4_in_rf12:    biomek2000_a4.in_from_rf12
          a4_in_motoman: biomek2000_a4.in_from_motoman
        output_spots:
          a4_out_rf3: biomek2000_a4.out_rf3

  reformatter_20:
    modes:
      - devices: [reformatter]
        duration: 20
        input_spots:
          rf20_in_rf12:    reformatter.rf_link
          rf20_in_motoman: reformatter.rf20_in_motoman
          rf20_in_a3_24:   reformatter.rf20_in_a3_24
        output_spots:
          rf20_out_rf3:   reformatter.rf_link
          rf20_out_a3_19: reformatter.rf20_out_a3_19

  biomek_a3_19:
    modes:
      - devices: [biomek2000_a3]
        duration: 19
        input_spots:
          a3_19_in: biomek2000_a3.a19_in
        output_spots:
          a3_19_out_rf3: biomek2000_a3.a19_out

  reformatter_3:
    modes:
      - devices: [reformatter]
        duration: 3
        input_spots:
          rf3_in_a4:    reformatter.rf3_in_a4
          rf3_in_rf20:  reformatter.rf_link
          rf3_in_a3_19: reformatter.rf3_in_a3_19

objective:
  kind: makespan
