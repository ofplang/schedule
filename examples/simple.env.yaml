# Execution environment for simple.workflow.yaml (docs/SPECIFICATIONS.md §5).
#
# Ported from ofp-scheduler's `examples/app/app_context.json`. Notes on the port:
#   - stations "station-0" / "station-1" become devices `station_0` / `station_1`
#     (hyphens are not allowed in v0 identifiers, §8.1); each owns a single spot
#     `core` (was `spot-s0-core` / `spot-s1-core`).
#   - reagent inventory / capacities and the replenishment station are dropped
#     (device-local resources are outside the initial scope).
#   - a single transporter; only the used direction (station_0 -> station_1) is
#     listed (same-spot 0-duration entries omitted, §5.4).

time:
  unit: second

devices:
  - id: station_0
    spots: [core]
  - id: station_1
    spots: [core]

transporters:
  - id: transport

transports:
  - { transporter: transport, from: station_0.core, to: station_1.core, duration: 1 }

processes:

  source:
    modes:
      - devices: [station_0]
        duration: 2
        output_spots:
          source_out: station_0.core

  target:
    modes:
      - devices: [station_1]
        duration: 2
        input_spots:
          target_in: station_1.core

objective:
  kind: makespan
