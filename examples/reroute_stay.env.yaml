# Environment for a "stay-put" replan of the `simple` workflow.
#
# Scenario: the transport has already delivered the sample to station_1.core, and
# `target` still runs there — the destination has NOT moved. Normalization still
# inserts a relay at the arrival spot plus a re-transport to the destination's
# input spot (SPEC §7), but since that input spot is the same station_1.core, the
# re-transport is a zero-distance no-op. The relay + no-op leg are therefore folded
# out of the output (SPEC §6.4.1), leaving the committed leg to deliver straight to
# the target. Contrast reroute.env.yaml (a real move to station_2, relay kept).
#
#   ofp-schedule schedule simple.workflow.yaml --env reroute_stay.env.yaml \
#       --status reroute_stay.status.yaml
time:
  unit: second

devices:
  - id: station_0
    spots: [core]
  - id: station_1
    spots: [core]

transporters:
  - id: transport

transports:
  - { transporter: transport, from: station_0.core, to: station_1.core, duration: 1 }

processes:
  source:
    modes:
      - devices: [station_0]
        duration: 2
        output_spots: { source_out: station_0.core }
  target:
    modes:
      - devices: [station_1]        # target still runs where the sample landed
        duration: 2
        input_spots: { target_in: station_1.core }
